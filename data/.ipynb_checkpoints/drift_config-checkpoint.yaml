# =============================================================================
# drift_config.yaml
# Domino Model Monitor configuration for the LendingCloud credit risk model.
#
# Reference: https://docs.dominodatalab.com/en/latest/user_guide/model-monitor/
#
# This file documents the monitor setup used in Lab 4.
# Configuration is applied via the Domino Model Monitor UI or API.
# =============================================================================

model:
  name: "lending-club-model-monitor-yourname"       # Update to match your deployed endpoint name
  description: "LendingClub loan default prediction - Random Forest classifier"
  prediction_type: classification
  target_column: is_default
  positive_class: 1                         # 1 = Default

# -----------------------------------------------------------------------------
# Baseline dataset
# Generated by: python scripts/monitoring_baseline.py --mode baseline
# -----------------------------------------------------------------------------
baseline:
  path: "monitoring/baseline_stats.json"
  n_samples: 5000
  default_rate: ~0.22                       # Expected baseline default rate

# -----------------------------------------------------------------------------
# Features to monitor for drift
# PSI thresholds apply to all features unless overridden per-feature
# -----------------------------------------------------------------------------
drift:
  method: PSI                               # Population Stability Index
  thresholds:
    monitor: 0.10                           # Amber alert - watch closely
    retrain: 0.20                           # Red alert - trigger retraining

  features:
    - name: loan_amnt
      description: "Requested loan amount"
      alert_priority: medium

    - name: int_rate
      description: "Loan interest rate - reflects credit grade"
      alert_priority: high

    - name: installment
      description: "Monthly payment amount"
      alert_priority: medium

    - name: annual_inc
      description: "Applicant annual income"
      alert_priority: high

    - name: emp_length
      description: "Employment length in years"
      alert_priority: medium

    - name: dti
      description: "Debt-to-income ratio - key default predictor"
      alert_priority: high

    - name: revol_bal
      description: "Total revolving credit balance"
      alert_priority: medium

    - name: revol_util
      description: "Revolving credit utilisation rate"
      alert_priority: medium

    - name: open_acc
      description: "Number of open credit lines"
      alert_priority: medium

    - name: total_acc
      description: "Total number of credit lines"
      alert_priority: medium

    - name: pub_rec
      description: "Number of derogatory public records"
      alert_priority: high

    - name: delinq_2yrs
      description: "Number of delinquencies in past 2 years"
      alert_priority: high

    - name: fico_range_low
      description: "FICO score lower bound"
      alert_priority: high

    - name: fico_range_high
      description: "FICO score upper bound"
      alert_priority: high

    - name: inq_last_6mths
      description: "Credit inquiries in last 6 months"
      alert_priority: medium

    - name: mort_acc
      description: "Number of mortgage accounts"
      alert_priority: low

    - name: bc_util
      description: "Bankcard utilisation rate"
      alert_priority: medium

    - name: num_bc_tl
      description: "Number of bankcard accounts"
      alert_priority: low

    - name: loan_to_income
      description: "Engineered: loan amount / annual income"
      alert_priority: high

    - name: credit_utilization
      description: "Engineered: normalised revolving utilisation"
      alert_priority: medium

    - name: payment_to_income
      description: "Engineered: monthly payment burden as % of income"
      alert_priority: medium

    - name: has_derog
      description: "Flag: has derogatory records"
      alert_priority: high

    - name: credit_breadth
      description: "Breadth of credit portfolio"
      alert_priority: low

    - name: credit_age_years
      description: "Age of oldest credit line in years"
      alert_priority: medium

    - name: grade_B
      description: "Loan grade B indicator"
      alert_priority: medium

    - name: grade_C
      description: "Loan grade C indicator"
      alert_priority: medium

    - name: grade_D
      description: "Loan grade D indicator"
      alert_priority: medium

    - name: grade_E
      description: "Loan grade E indicator"
      alert_priority: medium

    - name: grade_F
      description: "Loan grade F indicator"
      alert_priority: medium

    - name: grade_G
      description: "Loan grade G indicator"
      alert_priority: medium

    - name: home_ownership_MORTGAGE
      description: "Home ownership: MORTGAGE"
      alert_priority: low

    - name: home_ownership_NONE
      description: "Home ownership: NONE"
      alert_priority: low

    - name: home_ownership_OTHER
      description: "Home ownership: OTHER"
      alert_priority: low

    - name: home_ownership_OWN
      description: "Home ownership: OWN"
      alert_priority: low

    - name: home_ownership_RENT
      description: "Home ownership: RENT"
      alert_priority: low

    - name: purpose_credit_card
      description: "Loan purpose: credit card"
      alert_priority: low

    - name: purpose_debt_consolidation
      description: "Loan purpose: debt consolidation"
      alert_priority: low

    - name: purpose_educational
      description: "Loan purpose: educational"
      alert_priority: low

    - name: purpose_home_improvement
      description: "Loan purpose: home improvement"
      alert_priority: low

    - name: purpose_house
      description: "Loan purpose: house"
      alert_priority: low

    - name: purpose_major_purchase
      description: "Loan purpose: major purchase"
      alert_priority: low

    - name: purpose_medical
      description: "Loan purpose: medical"
      alert_priority: low

    - name: purpose_moving
      description: "Loan purpose: moving"
      alert_priority: low

    - name: purpose_other
      description: "Loan purpose: other"
      alert_priority: low

    - name: purpose_renewable_energy
      description: "Loan purpose: renewable energy"
      alert_priority: low

    - name: purpose_small_business
      description: "Loan purpose: small business"
      alert_priority: low

    - name: purpose_vacation
      description: "Loan purpose: vacation"
      alert_priority: low

    - name: purpose_wedding
      description: "Loan purpose: wedding"
      alert_priority: low

    - name: term_60
      description: "60-month term indicator"
      alert_priority: medium

    - name: verification_status_Source Verified
      description: "Verification status: Source Verified"
      alert_priority: low

    - name: verification_status_Verified
      description: "Verification status: Verified"
      alert_priority: low

# -----------------------------------------------------------------------------
# Prediction drift - monitor output distribution
# -----------------------------------------------------------------------------
prediction_drift:
  enabled: true
  metric: default_probability               # Continuous output from predict.py
  threshold_monitor: 0.05                   # Alert if mean prob shifts by > 5pp
  threshold_retrain: 0.10                   # Retrain if mean prob shifts by > 10pp

# -----------------------------------------------------------------------------
# Data quality checks
# -----------------------------------------------------------------------------
data_quality:
  null_rate_threshold: 0.05                 # Alert if any feature exceeds 5% nulls
  check_features:
    - dti
    - int_rate
    - annual_inc
    - loan_amnt
    - revol_util
    - installment
    - fico_range_low
    - fico_range_high
    - loan_to_income
    - credit_utilization
    - payment_to_income

# -----------------------------------------------------------------------------
# Alerting
# -----------------------------------------------------------------------------
alerts:
  email:
    enabled: true
    recipients:
      - "your-email@company.com"            # Update with your address
  channels:
    - drift
    - data_quality
    - prediction_drift

# -----------------------------------------------------------------------------
# Retraining trigger
# -----------------------------------------------------------------------------
retraining:
  auto_trigger: false                       # Manual approval required in workshop
  trigger_on:
    - retrain_threshold_breached            # Any feature PSI >= 0.2
    - prediction_drift_retrain              # Prediction mean shift >= 10pp
  retraining_job: "scripts/multitrain.py"
  notify_on_completion: true
